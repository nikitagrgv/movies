services:
  postgres:
    image: postgres:16
    container_name: movies_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_EXPOSED_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: movies_migrate
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "-path", "/migrations",
        "-database",
        "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable",
        "up"
      ]

  redis:
    image: redis:7-alpine
    container_name: movies_redis
    command: [
      "redis-server",
      "--maxmemory", "500mb",
      "--maxmemory-policy", "allkeys-lru"
    ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  movies:
    build: .
    container_name: movies_app
    restart: unless-stopped
    environment:
      MOVIES_LISTEN_PORT: ${MOVIES_LISTEN_PORT}
      MOVIES_GRPC_LISTEN_PORT: ${MOVIES_GRPC_LISTEN_PORT}
      MOVIES_TMDB_TOKEN: ${MOVIES_TMDB_TOKEN}

      REDIS_URL: ${REDIS_URL}

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432 # We can't change it

    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "${MOVIES_LISTEN_PORT}:${MOVIES_LISTEN_PORT}"
      - "127.0.0.1:${MOVIES_GRPC_LISTEN_PORT}:${MOVIES_GRPC_LISTEN_PORT}"

volumes:
  postgres_data:
