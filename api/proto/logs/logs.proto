syntax = "proto3";

package logs;

option go_package = "github.com/nikitagrgv/movies/delivery/grpc/pb;pb";

service LogService {
  rpc GetLogs (GetLogsRequest) returns (GetLogsResponse);
}

message GetLogsRequest {
  //  Nothing here yet
}

message GetLogsResponse{
  repeated UserLogInfo info = 1;
}

message UserLogInfo{
  string ip = 1;
  string last_url = 2;
  int32 usages = 3;
}