{{define "search-form"}}
<div class="search-wrapper">
    <form class="search-form" action="/search" method="GET">
        <div class="search-type-toggle">
            <button type="button" class="toggle-segment" data-type="movie">Movies</button>
            <button type="button" class="toggle-segment" data-type="tv">TV Shows</button>
        </div>
        <input
                type="text"
                name="s"
                class="search-input"
                placeholder="Search movies..."
                value="{{.SearchString}}"
                autocomplete="off"
        >
        <input type="hidden" name="type" value="movie">
        <button type="submit" class="search-button">Search</button>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggleContainer = document.querySelector('.search-type-toggle');
        const toggleSegments = document.querySelectorAll('.toggle-segment');
        const searchInput = document.querySelector('.search-input');
        const typeInput = document.querySelector('input[name="type"]');

        const savedType = localStorage.getItem('searchType') || 'movie';
        const activeSegment = document.querySelector(`.toggle-segment[data-type="${savedType}"]`);

        if (activeSegment) {
            toggleSegments.forEach(s => s.classList.remove('toggle-segment--active'));
            activeSegment.classList.add('toggle-segment--active');
            searchInput.placeholder = savedType === 'movie' ? 'Search movies...' : 'Search TV shows...';
            typeInput.value = savedType;
        }

        toggleContainer.addEventListener('click', function (e) {
            const clickedSegment = e.target.closest('.toggle-segment');
            if (clickedSegment) {
                toggleSegments.forEach(s => s.classList.remove('toggle-segment--active'));
                clickedSegment.classList.add('toggle-segment--active');

                const type = clickedSegment.getAttribute('data-type');
                searchInput.placeholder = type === 'movie' ? 'Search movies...' : 'Search TV shows...';
                typeInput.value = type;

                localStorage.setItem('searchType', type);
            }
        });
    });
</script>
{{end}}
