{{define "search-form"}}
<div class="search-wrapper">
    <form class="search-form" action="/search" method="GET">
        <div class="search-type-toggle">
            <button type="button" class="toggle-segment toggle-segment--active" data-type="movie">Movie</button>
            <button type="button" class="toggle-segment" data-type="tv">TV Show</button>
        </div>
        <input
                type="text"
                name="s"
                class="search-input"
                placeholder="Search movies..."
                value="{{.SearchString}}"
                autocomplete="off"
        >
        <button type="submit" class="search-button">Search</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggleSegments = document.querySelectorAll('.toggle-segment');
    const searchInput = document.querySelector('.search-input');
    const searchForm = document.querySelector('.search-form');
    
    toggleSegments.forEach(segment => {
        segment.addEventListener('click', function() {
            toggleSegments.forEach(s => s.classList.remove('toggle-segment--active'));
            this.classList.add('toggle-segment--active');
            
            const type = this.getAttribute('data-type');
            searchInput.placeholder = type === 'movie' ? 'Search movies...' : 'Search TV shows...';
            searchInput.name = type === 'movie' ? 's' : 'tv';
        });
    });
});
</script>
{{end}}
